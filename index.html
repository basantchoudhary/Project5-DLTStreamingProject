<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project 5 · DLT Streaming — Portal</title>
<style>
  :root{--bg:#0b1020;--panel:#121a30;--panel2:#0e1526;--ink:#e8edf7;--muted:#9fb0cc;
        --line:#243154;--accent:#4ea1ff;--accent2:#38d39f;--accent3:#f2b04a;}
  @media (prefers-color-scheme: light){
    :root{--bg:#f4f7fc;--panel:#fff;--panel2:#eef3fb;--ink:#132038;--muted:#5a6a86;
          --line:#dbe4f3;--accent:#1b6fe0;--accent2:#0f9d76;--accent3:#c2410c;}}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
       font:15px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);
         background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:1rem;margin:0;font-weight:700}
  header .gh{margin-left:auto;font-size:.85rem}
  header a{color:var(--accent);text-decoration:none}
  #burger{display:none;background:none;border:1px solid var(--line);color:var(--ink);
          border-radius:8px;padding:4px 10px;cursor:pointer}
  .layout{flex:1;display:flex;min-height:0}
  nav{width:290px;flex:none;overflow-y:auto;padding:16px 12px 60px;border-right:1px solid var(--line);
      background:var(--panel2)}
  nav .grp{font-size:.7rem;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);
           margin:16px 8px 6px}
  nav a{display:block;padding:6px 10px;border-radius:8px;color:var(--ink);text-decoration:none;
        font-size:.86rem;cursor:pointer;border:1px solid transparent}
  nav a:hover{background:var(--panel)}
  nav a.active{background:var(--panel);border-color:var(--accent);color:var(--accent)}
  nav a small{color:var(--muted);display:block;font-size:.72rem}
  main{flex:1;overflow-y:auto;min-width:0}
  #content{max-width:900px;margin:0 auto;padding:30px 26px 90px}
  iframe{width:100%;height:100%;border:0;background:var(--bg)}
  .frameWrap{height:100%;display:none}
  /* markdown */
  #md h1{font-size:1.8rem;margin:.2em 0 .5em;letter-spacing:-.01em}
  #md h2{font-size:1.3rem;margin:1.4em 0 .5em;border-bottom:1px solid var(--line);padding-bottom:5px}
  #md h3{font-size:1.05rem;margin:1.2em 0 .4em;color:var(--accent)}
  #md p,#md li{color:var(--ink)}
  #md a{color:var(--accent);text-decoration:none}
  #md a:hover{text-decoration:underline}
  #md code{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:.86em}
  #md pre{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;overflow-x:auto}
  #md pre code{background:none;border:0;padding:0;font-size:.82rem;line-height:1.5}
  #md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.9rem;display:block;overflow-x:auto}
  #md th,#md td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
  #md th{background:var(--panel);color:var(--accent)}
  #md blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:2px 14px;color:var(--muted)}
  .hint{color:var(--muted);font-size:.85rem}
  @media (max-width:820px){
    #burger{display:inline-block}
    nav{position:fixed;left:0;top:49px;bottom:0;z-index:6;transform:translateX(-100%);transition:transform .2s}
    nav.open{transform:none}
  }
</style>
</head>
<body>
<header>
  <button id="burger">☰</button>
  <h1>Project 5 · Metadata-Driven DLT Streaming</h1>
  <span class="gh"><a href="https://github.com/basantchoudhary/Project5-DLTStreamingProject" target="_blank" rel="noopener">GitHub ↗</a></span>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div id="content"><div id="md"></div></div>
    <div class="frameWrap" id="frameWrap"><iframe id="frame" title="page"></iframe></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const NAV = [
  {grp:"Start here", items:[
    {t:"Overview (README)", p:"README.md", type:"md"},
  ]},
  {grp:"Design (interactive)", items:[
    {t:"High-level flow", p:"design/high-level-flow.html", type:"html"},
    {t:"Low-level design", p:"design/low-level-design.html", type:"html"},
    {t:"Metadata tables design", p:"design/metadata-tables-design.html", type:"html"},
  ]},
  {grp:"Docs", items:[
    {t:"Architecture", p:"docs/01-architecture.md", type:"md"},
    {t:"Metadata model", p:"docs/02-metadata-model.md", type:"md"},
    {t:"Silver & Gold design", p:"docs/03-silver-and-gold-design.md", type:"md"},
    {t:"Real-time to Power BI", p:"docs/04-realtime-to-powerbi.md", type:"md"},
  ]},
  {grp:"Concepts to learn", items:[
    {t:"Index", p:"ComponentWiseConceptToLearn/README.md", type:"md"},
    {t:"01 · Oracle redo log", p:"ComponentWiseConceptToLearn/01-oracle-redo-log.md", type:"md"},
    {t:"02 · Change Data Capture", p:"ComponentWiseConceptToLearn/02-change-data-capture.md", type:"md"},
    {t:"03 · SCD1 vs SCD2", p:"ComponentWiseConceptToLearn/03-scd1-vs-scd2.md", type:"md"},
    {t:"04 · Spark Structured Streaming", p:"ComponentWiseConceptToLearn/04-spark-structured-streaming.md", type:"md"},
    {t:"05 · Auto Loader", p:"ComponentWiseConceptToLearn/05-auto-loader.md", type:"md"},
    {t:"06 · Event-driven ingestion", p:"ComponentWiseConceptToLearn/06-event-driven-file-ingestion.md", type:"md"},
    {t:"07 · apply_changes", p:"ComponentWiseConceptToLearn/07-dlt-apply-changes.md", type:"md"},
    {t:"08 · append_flow", p:"ComponentWiseConceptToLearn/08-append-flow.md", type:"md"},
    {t:"09 · Trigger & processing time", p:"ComponentWiseConceptToLearn/09-trigger-and-processing-time.md", type:"md"},
    {t:"10 · Delete handling (soft)", p:"ComponentWiseConceptToLearn/10-delete-handling-soft-delete.md", type:"md"},
    {t:"11 · Idempotency via PK", p:"ComponentWiseConceptToLearn/11-idempotency-primary-key.md", type:"md"},
    {t:"12 · Schema evolution", p:"ComponentWiseConceptToLearn/12-schema-evolution.md", type:"md"},
    {t:"13 · Late arrival", p:"ComponentWiseConceptToLearn/13-late-arrival-handling.md", type:"md"},
    {t:"14 · Invalid records / reprocess", p:"ComponentWiseConceptToLearn/14-record-drop-and-invalid-records.md", type:"md"},
    {t:"15 · Why DLT vs streaming", p:"ComponentWiseConceptToLearn/15-why-dlt-vs-spark-streaming.md", type:"md"},
    {t:"16 · Technology alternatives", p:"ComponentWiseConceptToLearn/16-technology-alternatives.md", type:"md"},
    {t:"17 · Reload strategies", p:"ComponentWiseConceptToLearn/17-reload-strategies.md", type:"md"},
    {t:"18 · Recon & latency", p:"ComponentWiseConceptToLearn/18-observability-recon-and-latency.md", type:"md"},
    {t:"19 · Testing framework", p:"ComponentWiseConceptToLearn/19-testing-framework.md", type:"md"},
  ]},
  {grp:"Project Challenges", items:[
    {t:"Index", p:"Project Challenges/README.md", type:"md"},
    {t:"Full → incr overlap", p:"Project Challenges/full-then-incr-overlap.md", type:"md"},
    {t:"apply_changes ordering", p:"Project Challenges/apply-changes-ordering.md", type:"md"},
    {t:"Schema evolution in CT", p:"Project Challenges/schema-evolution-in-ct.md", type:"md"},
    {t:"Small files from CDC", p:"Project Challenges/small-files-from-cdc.md", type:"md"},
    {t:"Blast radius & groups", p:"Project Challenges/blast-radius-and-groups.md", type:"md"},
    {t:"High cost", p:"Project Challenges/high-cost.md", type:"md"},
    {t:"End-to-end latency (<1min)", p:"Project Challenges/end-to-end-latency.md", type:"md"},
    {t:"Full-load problems", p:"Project Challenges/full-load-problems.md", type:"md"},
    {t:"Redo-log flood", p:"Project Challenges/redo-log-flood-from-maintenance.md", type:"md"},
    {t:"Qlik & no primary key", p:"Project Challenges/qlik-no-primary-key.md", type:"md"},
    {t:"Changing primary key", p:"Project Challenges/changing-primary-key.md", type:"md"},
    {t:"Auto-optimize overhead", p:"Project Challenges/auto-optimize-overhead.md", type:"md"},
    {t:"Missing log sequence", p:"Project Challenges/missing-log-sequence.md", type:"md"},
    {t:"One-by-one vs batch apply", p:"Project Challenges/qlik-one-by-one-vs-batch-apply.md", type:"md"},
    {t:"Liquid clustering not working", p:"Project Challenges/liquid-clustering-not-working.md", type:"md"},
    {t:"Streaming join miss → reprocess", p:"Project Challenges/streaming-join-miss-reprocess.md", type:"md"},
    {t:"Heavy joins — cost & perf", p:"Project Challenges/streaming-join-performance-cost.md", type:"md"},
    {t:"Autoscale won't scale down", p:"Project Challenges/autoscale-not-scaling-down.md", type:"md"},
  ]},
  {grp:"Code (on GitHub)", items:[
    {t:"framework/ (engine)", p:"https://github.com/basantchoudhary/Project5-DLTStreamingProject/tree/main/framework", type:"ext"},
    {t:"metadata/ (SQL)", p:"https://github.com/basantchoudhary/Project5-DLTStreamingProject/tree/main/metadata", type:"ext"},
    {t:"deploy/create_dlt_pipelines.py", p:"https://github.com/basantchoudhary/Project5-DLTStreamingProject/blob/main/deploy/create_dlt_pipelines.py", type:"ext"},
    {t:"testing/", p:"https://github.com/basantchoudhary/Project5-DLTStreamingProject/tree/main/testing", type:"ext"},
  ]},
];

const nav = document.getElementById('nav');
const mdEl = document.getElementById('md');
const content = document.getElementById('content');
const frameWrap = document.getElementById('frameWrap');
const frame = document.getElementById('frame');
let activeLink = null;

// build sidebar
NAV.forEach(group=>{
  const g = document.createElement('div'); g.className='grp'; g.textContent=group.grp; nav.appendChild(g);
  group.items.forEach(it=>{
    const a=document.createElement('a'); a.textContent=it.t; a.dataset.p=it.p; a.dataset.type=it.type;
    a.href = it.type==='ext' ? it.p : '#'+encodeURIComponent(it.p);
    if(it.type==='ext'){ a.target='_blank'; a.rel='noopener'; }
    else a.addEventListener('click',e=>{e.preventDefault(); open(it.p, it.type, a);});
    nav.appendChild(a);
  });
});

function setActive(a){ if(activeLink)activeLink.classList.remove('active'); activeLink=a; if(a)a.classList.add('active'); }

function showMd(){ content.style.display='block'; frameWrap.style.display='none'; }
function showFrame(){ content.style.display='none'; frameWrap.style.display='block'; }

function open(path, type, linkEl){
  // find nav link if not passed
  if(!linkEl){ linkEl=[...nav.querySelectorAll('a')].find(x=>x.dataset.p===path); }
  setActive(linkEl);
  if(window.innerWidth<=820) nav.classList.remove('open');
  if(type==='html'){ showFrame(); frame.src = encodeURI(path); location.hash=encodeURIComponent(path); return; }
  showMd();
  mdEl.innerHTML='<p class="hint">Loading…</p>';
  fetch(encodeURI(path)).then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(txt=>{ mdEl.innerHTML = marked.parse(txt); rewriteLinks(path); content.parentElement.scrollTop=0; location.hash=encodeURIComponent(path); })
    .catch(e=>{ mdEl.innerHTML='<p class="hint">Could not load '+path+' ('+e.message+').</p>'; });
}

// make relative links inside rendered markdown navigate within the SPA
function rewriteLinks(currentPath){
  const dir = currentPath.substring(0, currentPath.lastIndexOf('/')+1);
  mdEl.querySelectorAll('a[href]').forEach(a=>{
    const href=a.getAttribute('href');
    if(/^(https?:|mailto:|#)/.test(href)) { if(/^https?:/.test(href)){a.target='_blank';a.rel='noopener';} return; }
    // resolve relative to current file's directory
    let resolved;
    try{ resolved = new URL(href, 'https://x/'+dir).pathname.slice(1); }catch(_){ return; }
    const clean = resolved.split('#')[0];
    if(clean.endsWith('.md')){ a.addEventListener('click',e=>{e.preventDefault(); open(decodeURIComponent(clean),'md');}); }
    else if(clean.endsWith('.html')){ a.addEventListener('click',e=>{e.preventDefault(); open(decodeURIComponent(clean),'html');}); }
    else { a.setAttribute('href','https://github.com/basantchoudhary/Project5-DLTStreamingProject/blob/main/'+clean); a.target='_blank'; a.rel='noopener'; }
  });
}

document.getElementById('burger').addEventListener('click',()=>nav.classList.toggle('open'));

// initial route
const start = location.hash ? decodeURIComponent(location.hash.slice(1)) : 'README.md';
const startType = start.endsWith('.html') ? 'html' : 'md';
open(start, startType);
</script>
</body>
</html>
